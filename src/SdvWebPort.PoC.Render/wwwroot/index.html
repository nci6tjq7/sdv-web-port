<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SdvWebPort PoC — KNI WebGL Render</title>
  <style>
    body {
      margin: 0; padding: 20px;
      background: #1a1a1a; color: #eee;
      font-family: sans-serif;
    }
    canvas { display: block; border: 1px solid #444; background: #000; }
    #log {
      margin-top: 10px; padding: 10px;
      background: #2a2a2a; border-radius: 4px;
      font-family: monospace; font-size: 12px;
      max-height: 200px; overflow-y: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h2>SdvWebPort PoC — KNI WebGL Rendering</h2>
  <canvas id="monogame-canvas" width="800" height="600"></canvas>
  <div id="log">[boot] Loading WASM runtime...</div>

  <script>
    // Capture console.log into on-page log div for headless Chrome capture
    const logEl = document.getElementById('log');
    const origLog = console.log;
    console.log = function(...args) {
      origLog.apply(console, args);
      try {
        const line = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ') + '\n';
        logEl.textContent += line;
        logEl.scrollTop = logEl.scrollHeight;
      } catch (e) {}
    };
    window.addEventListener('error', (e) => {
      logEl.textContent += '[error] ' + (e.message || e.error) + '\n';
    });
    window.addEventListener('unhandledrejection', (e) => {
      logEl.textContent += '[unhandledrejection] ' + (e.reason && e.reason.message ? e.reason.message : e.reason) + '\n';
    });
  </script>

  <!-- Uno.Wasm.Bootstrap loader: imports dotnet.js, calls dotnet.create() -->
  <!-- mainAssemblyName in dotnet.boot.js is "SdvWebPort.PoC.Render.dll" -->
  <!-- so Main auto-runs after create() completes -->
  <script type="module">
    try {
      console.log('[boot] importing dotnet.js...');
      const { dotnet } = await import('./_framework/dotnet.js');
      console.log('[boot] dotnet.js imported, calling create()...');
      const runtime = await dotnet.create();
      console.log('[boot] dotnet.create() done. runtime=' + (runtime ? 'yes' : 'no'));
      // Uno.Wasm.Bootstrap auto-invokes mainAssemblyName's Main on create()
      // If not, try runMain explicitly:
      if (runtime && typeof runtime.runMain === 'function') {
        try {
          const exitCode = await runtime.runMain();
          console.log('[boot] runMain exitCode=' + exitCode);
        } catch (e) {
          console.log('[boot] runMain threw: ' + e.message);
        }
      }
    } catch (e) {
      console.log('[boot] FATAL: ' + e.message);
      console.log('[boot] stack: ' + e.stack);
    }
  </script>
</body>
</html>
