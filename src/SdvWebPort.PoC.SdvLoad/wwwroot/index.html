<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SdvWebPort PoC — Phase 2.5 Game1 Invoke</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; margin: 20px; }
        h1 { color: #569cd6; }
        pre { background: #000; padding: 10px; border-radius: 5px; max-height: 400px; overflow: auto; white-space: pre-wrap; word-wrap: break-word; }
        canvas { border: 2px solid #569cd6; background: #000; display: block; margin: 10px 0; }
        .status { color: #4ec9b0; }
        .fail { color: #f44747; }
        .pass { color: #6a9955; }
        #canvas-container { display: flex; flex-direction: column; align-items: flex-start; }
    </style>
</head>
<body>
    <h1>SdvWebPort PoC — Phase 2.5: Game1 Invoke + Render</h1>
    <p class="status">Status: <span id="status">Starting...</span></p>

    <div id="canvas-container">
        <label for="theCanvas">Game Canvas (KNI renders here via WebGL2):</label>
        <!-- KNI's Blazor.GL platform looks for a canvas with id 'theCanvas' by default.
             (Same ID as PoC.Render — proven working.) -->
        <!-- The 800x600 matches MockSdv.Game1's PreferredBackBufferWidth/Height. -->
        <canvas id="theCanvas" width="800" height="600"></canvas>
    </div>

    <pre id="log">Loading runtime...</pre>

    <!--
      KNI's Blazor.GL platform depends on the nkast.Wasm.* JS interop layer.
      These scripts must load BEFORE main.js so that globalThis.window.nkJSObject,
      nkWindow, nkDocument, nkCanvas, etc. are available when C# code calls into them.
      Served from _content/{PackageName}/js/{File}.js via Static Web Assets.
      (Same pattern as PoC.Render — proven working.)
    -->
    <script src="_content/nkast.Wasm.JSInterop/js/JSObject.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Window.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Document.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Navigator.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Gamepad.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Media.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/Canvas.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/Canvas2dContext.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/CanvasGLContext.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.XHR/js/XHR.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Audio/js/Audio.8.0.11.js"></script>

    <script type="module" src="main.js"></script>
</body>
</html>
