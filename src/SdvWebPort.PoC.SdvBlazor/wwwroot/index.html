<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SDV Web Port — Phase 2.6 SdvBlazor</title>
    <base href="/" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <div style="margin: 1em; font-family: monospace; font-size: 1.5em; color: #569cd6;">
            Loading SDV Web Port Phase 2.6...
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Blazor WASM boot script (auto-starts) -->
    <script src="_framework/blazor.webassembly.js"></script>

    <!--
      KNI's Blazor.GL platform depends on the nkast.Wasm.* JS interop layer.
      Same scripts as Phase 2.5b BlazorGameLoop.
    -->
    <script src="_content/nkast.Wasm.JSInterop/js/JSObject.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Window.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Document.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Navigator.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Gamepad.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Media.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/Canvas.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/Canvas2dContext.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/CanvasGLContext.10.0.0.js"></script>
    <script src="_content/nkast.Wasm.XHR/js/XHR.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Audio/js/Audio.8.0.11.js"></script>

    <!--
      Game loop driver — KNI's StartGameLoop() is an empty stub, so we drive
      the loop externally via requestAnimationFrame. Same pattern as Phase 2.5b.
      Uses invokeMethodAsync because TickDotNet returns Task.
    -->
    <script>
        // Synchronous fetch for VFS (WASM can't block on async HttpClient)
        // Note: synchronous XHR can't use responseType='arraybuffer', so we
        // use a base64-encoded response and decode it on the JS side.
        window.syncFetch = function(url) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, false);  // false = synchronous
            xhr.overrideMimeType('text/plain; charset=x-user-defined');
            xhr.send();
            if (xhr.status === 200) {
                // Convert binary string to Uint8Array
                var text = xhr.responseText;
                var bytes = new Uint8Array(text.length);
                for (var i = 0; i < text.length; i++) {
                    bytes[i] = text.charCodeAt(i) & 0xff;
                }
                return bytes;
            }
            throw new Error('HTTP ' + xhr.status + ': ' + url);
        };

        // File System Access API — directory picker for GOG install folder
        window.pickSdvDirectory = async function() {
            if (!window.showDirectoryPicker) {
                console.log('[pickSdvDirectory] File System Access API not supported');
                return null;
            }
            try {
                var handle = await window.showDirectoryPicker({ mode: 'read' });
                return true; // success
            } catch (e) {
                console.log('[pickSdvDirectory] Error: ' + e.message);
                return null;
            }
        };

        // File upload — read files from <input type="file" webkitdirectory>
        window.uploadSdvFiles = async function(fileInputId) {
            var input = document.getElementById(fileInputId);
            if (!input || !input.files || input.files.length === 0) {
                console.log('[uploadSdvFiles] No files selected');
                return null;
            }
            var results = [];
            for (var i = 0; i < input.files.length; i++) {
                var file = input.files[i];
                var path = file.webkitRelativePath || file.name;
                results.push({ name: path, size: file.size });
            }
            return JSON.stringify(results);
        };

        // Read a specific file from the uploaded set
        window.readUploadedFile = async function(fileInputId, fileName) {
            var input = document.getElementById(fileInputId);
            if (!input || !input.files) return null;
            for (var i = 0; i < input.files.length; i++) {
                var file = input.files[i];
                var path = file.webkitRelativePath || file.name;
                if (path === fileName || path.endsWith('/' + fileName) || path.endsWith('\\' + fileName)) {
                    var buffer = await file.arrayBuffer();
                    var bytes = new Uint8Array(buffer);
                    // Convert to base64 for JSInterop (can't pass Uint8Array directly in some cases)
                    var binary = '';
                    for (var j = 0; j < bytes.length; j++) {
                        binary += String.fromCharCode(bytes[j]);
                    }
                    return btoa(binary);
                }
            }
            return null;
        };

        function tickJS() {
            var canvas = document.getElementById('theCanvas');
            if (canvas) {
                var holder = document.getElementById('canvasHolder');
                if (holder) {
                    canvas.width = holder.clientWidth;
                    canvas.height = holder.clientHeight;
                }
            }

            if (window.theInstance) {
                try {
                    window.theInstance.invokeMethodAsync('TickDotNet');
                } catch (e) {
                    console.error('[tickJS] Error invoking TickDotNet: ' + e.message);
                }
            }
            window.requestAnimationFrame(tickJS);
        }

        window.initRenderJS = (instance) => {
            window.theInstance = instance;
            console.log('[initRenderJS] Instance registered, starting game loop');
            window.requestAnimationFrame(tickJS);
        };
    </script>
</body>

</html>
