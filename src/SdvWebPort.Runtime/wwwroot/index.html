<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SdvWebPort — Phase 0 Skeleton (Blazor WASM)</title>
  <style>
    body { margin: 0; padding: 0; background: #1a1a1a; color: #eee; font-family: sans-serif; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    canvas { display: block; width: 800px; height: 600px; border: 1px solid #444; }
    #status { margin-top: 10px; padding: 10px; background: #2a2a2a; border-radius: 4px; font-family: monospace; }
  </style>
  <!-- The Blazor WASM SDK injects the importmap (mapping unfingerprinted module paths
       to fingerprinted files) into this empty <script type="importmap"> tag at publish time. -->
  <link rel="preload" id="webassembly" />
  <script type="importmap"></script>
</head>
<body>
  <div class="container">
    <h1>Stardew Valley Web Port — Phase 0</h1>
    <p>Host: <strong>Blazor WebAssembly</strong> (Microsoft.NET.Sdk.WebAssembly)</p>
    <canvas id="game-canvas" width="800" height="600"></canvas>
    <div id="status">Initializing WASM runtime...</div>
  </div>

  <!-- JS interop target for C# [JSImport("globalThis.clearCanvas")] -->
  <script>
    globalThis.clearCanvas = function(r, g, b) {
      try {
        const canvas = document.getElementById('game-canvas');
        if (!canvas) { console.warn('[clearCanvas] canvas not found'); return; }
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        if (gl && typeof gl.clearColor === 'function') {
          gl.clearColor(r / 255, g / 255, b / 255, 1.0);
          gl.clear(gl.COLOR_BUFFER_BIT);
        } else {
          const ctx2d = canvas.getContext('2d');
          if (ctx2d) {
            ctx2d.fillStyle = `rgb(${r},${g},${b})`;
            ctx2d.fillRect(0, 0, canvas.width, canvas.height);
          }
        }
        const status = document.getElementById('status');
        if (status) status.innerText = `Canvas cleared to rgb(${r}, ${g}, ${b})`;
        console.log(`[clearCanvas] cleared to rgb(${r}, ${g}, ${b})`);
      } catch (e) {
        console.error('[clearCanvas] error:', e);
      }
    };
  </script>

  <!-- main.js is fingerprinted to main.[fingerprint].js by SDK; importmap rewrites the reference -->
  <script type="module" src="main#[.{fingerprint}].js"></script>
</body>
</html>
