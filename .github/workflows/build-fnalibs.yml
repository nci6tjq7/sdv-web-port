name: Build fnalibs from source

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-fnalibs.yml'

permissions:
  contents: read

env:
  EMSDK_VERSION: 3.1.56
  SDL_VERSION: release-3.4.4
  FNA3D_VERSION: 26.04
  FAUDIO_VERSION: 26.04

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt -y update
          sudo apt install -y ninja-build cmake llvm lld clang build-essential python-is-python3 curl git

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}

      - name: Verify emcc
        run: emcc -v

      - name: Build SDL3
        run: |
          git clone -b ${{ env.SDL_VERSION }} --depth 1 https://github.com/libsdl-org/SDL
          cd SDL
          mkdir emscripten-build && cd emscripten-build
          emcmake cmake -S .. \
            -DSDL_WERROR=OFF \
            -DSDL_TESTS=OFF \
            -DSDL_INSTALL_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_PTHREADS=OFF \
            -DSDL_PTHREADS_SEM=OFF \
            -GNinja
          ninja
          ninja install
          cp libSDL3.a /tmp/SDL3.a
          echo "SDL3_PREFIX=$(pwd)/prefix" >> $GITHUB_ENV

      - name: Build FNA3D
        run: |
          git clone -b ${{ env.FNA3D_VERSION }} --depth 1 --recurse-submodules https://github.com/FNA-XNA/FNA3D
          cd FNA3D
          git submodule update --init --recursive
          # Fix SpirvPatchTable undeclared error in mojoshader_sdlgpu.c
          # The file references SpirvPatchTable unconditionally but it's only
          # defined when SPIRV profile is enabled. Add a dummy typedef.
          sed -i '1i typedef struct { char _dummy[1]; } SpirvPatchTable;' \
            MojoShader/mojoshader_sdlgpu.c
          mkdir emscripten-build && cd emscripten-build
          emcmake cmake -S .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_PREFIX_PATH=${SDL3_PREFIX} \
            -DSDL3_DIR=${SDL3_PREFIX}/cmake \
            -GNinja
          ninja
          cp libFNA3D.a /tmp/FNA3D.a

      - name: Build FAudio
        run: |
          git clone -b ${{ env.FAUDIO_VERSION }} --depth 1 https://github.com/FNA-XNA/FAudio
          cd FAudio
          mkdir emscripten-build && cd emscripten-build
          emcmake cmake -S .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_PREFIX_PATH=${SDL3_PREFIX} \
            -DSDL3_DIR=${SDL3_PREFIX}/cmake \
            -GNinja
          ninja
          cp libFAudio.a /tmp/FAudio.a

      - name: Upload fnalibs
        uses: actions/upload-artifact@v4
        with:
          name: fnalibs-single
          path: |
            /tmp/SDL3.a
            /tmp/FNA3D.a
            /tmp/FAudio.a
          retention-days: 30
