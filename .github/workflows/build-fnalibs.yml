name: Build fnalibs from source

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-fnalibs.yml'

permissions:
  contents: read

env:
  EMSDK_VERSION: 3.1.56
  SDL_VERSION: release-3.4.4
  FNA3D_VERSION: 26.04
  FAUDIO_VERSION: 26.04

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt -y update
          sudo apt install -y ninja-build cmake llvm lld clang build-essential python-is-python3 curl git

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}

      - name: Verify emcc
        run: emcc -v

      - name: Build SDL3
        run: |
          git clone -b ${{ env.SDL_VERSION }} --depth 1 https://github.com/libsdl-org/SDL
          cd SDL
          mkdir emscripten-build && cd emscripten-build
          emcmake cmake -S .. \
            -DSDL_WERROR=OFF \
            -DSDL_TESTS=OFF \
            -DSDL_INSTALL_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_PTHREADS=OFF \
            -DSDL_PTHREADS_SEM=OFF \
            -GNinja
          ninja
          cp libSDL3.a /tmp/SDL3.a

      - name: Build FNA3D
        run: |
          git clone -b ${{ env.FNA3D_VERSION }} --depth 1 --recurse-submodules https://github.com/FNA-XNA/FNA3D
          cd FNA3D
          # FNA3D's CMake expects mojoshader source in a specific location
          # Initialize the submodule explicitly
          git submodule update --init --recursive
          ls -la mojoshader/ 2>/dev/null || echo "no mojoshader dir"
          mkdir emscripten-build && cd emscripten-build
          emcmake cmake -S .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -GNinja
          ninja
          cp libFNA3D.a /tmp/FNA3D.a

      - name: Build FAudio
        run: |
          git clone -b ${{ env.FAUDIO_VERSION }} --depth 1 https://github.com/FNA-XNA/FAudio
          cd FAudio
          mkdir emscripten-build && cd emscripten-build
          emcmake cmake -S .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -GNinja
          ninja
          cp libFAudio.a /tmp/FAudio.a

      - name: Build MojoShader (standalone)
        run: |
          git clone --depth 1 https://github.com/icculus/MojoShader
          cd MojoShader
          mkdir build && cd build
          emcmake cmake -S .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DSPIRV_CROSS=ON \
            -GNinja
          ninja
          cp libmojoshader.a /tmp/libmojoshader.a 2>/dev/null || find . -name "*.a" -exec cp {} /tmp/libmojoshader.a \;

      - name: Upload fnalibs
        uses: actions/upload-artifact@v4
        with:
          name: fnalibs-single
          path: |
            /tmp/SDL3.a
            /tmp/FNA3D.a
            /tmp/FAudio.a
            /tmp/libmojoshader.a
          retention-days: 30
