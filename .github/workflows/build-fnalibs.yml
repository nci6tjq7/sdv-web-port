name: Build fnalibs from source

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-fnalibs.yml'

permissions:
  contents: read

env:
  EMSDK_VERSION: 3.1.56
  SDL_VERSION: release-3.4.4
  FNA3D_VERSION: 26.07
  FAUDIO_VERSION: 26.04

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt -y update
          sudo apt install -y ninja-build cmake llvm lld clang build-essential python-is-python3 curl git

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}

      - name: Verify emcc
        run: emcc -v

      - name: Build SDL3
        run: |
          git clone -b ${{ env.SDL_VERSION }} --depth 1 https://github.com/libsdl-org/SDL
          cd SDL
          mkdir emscripten-build && cd emscripten-build
          # Enable pthreads + atomics for SharedArrayBuffer support.
          # .NET 10 WASM uses threads (--shared-memory), which requires all
          # linked libraries to be compiled with 'atomics' and 'bulk-memory' features.
          # Without these, wasm-ld fails: '--shared-memory is disallowed by SDL_spinlock.c.o
          # because it was not compiled with atomics or bulk-memory features'.
          emcmake cmake -S .. \
            -DSDL_WERROR=OFF \
            -DSDL_TESTS=OFF \
            -DSDL_INSTALL_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_PTHREADS=ON \
            -DSDL_PTHREADS_SEM=ON \
            -DCMAKE_C_FLAGS="-pthread -msimd128 -mmutable-globals -msign-ext -mbulk-memory -matomics" \
            -DCMAKE_CXX_FLAGS="-pthread -msimd128 -mmutable-globals -msign-ext -mbulk-memory -matomics" \
            -GNinja
          ninja
          ninja install
          cp libSDL3.a /tmp/SDL3.a
          echo "SDL3_PREFIX=$(pwd)/prefix" >> $GITHUB_ENV

      - name: Build FNA3D with MojoShader (SDL GPU driver removed)
        run: |
          git clone -b ${{ env.FNA3D_VERSION }} --depth 1 --recurse-submodules https://github.com/FNA-XNA/FNA3D
          cd FNA3D
          git submodule update --init --recursive
          
          # Remove SDL GPU driver from FNA3D (from r58Playz/FNA-WASM-Build patch).
          # SDL GPU calls functions that don't exist in WASM, causing
          # "function signature mismatch". FNA3D will use OpenGL directly.
          sed -i '/add_definitions(-DFNA3D_DRIVER_SDL)/d' CMakeLists.txt
          sed -i '/FNA3D_Driver_SDL\.c/d' CMakeLists.txt
          sed -i '/mojoshader_sdlgpu\.c/d' CMakeLists.txt
          sed -i '/#if FNA3D_DRIVER_SDL/{N;N;d;}' src/FNA3D.c

          # Force OpenGL ES 3.0 mode (required for WebGL 2.0 / SDV).
          # FNA3D checks SDL_GetHintBoolean("FNA3D_OPENGL_FORCE_ES3") and
          # SDL_GetPlatform() == "Emscripten". Both work in .NET WASM, but
          # SDL_GL_GetAttribute(SDL_GL_CONTEXT_PROFILE_MASK) doesn't return
          # the ES profile flag in emscripten's SDL3 build, so useES3 stays false.
          # Fix 1: hardcode forceES3 = 1
          sed -i 's/forceES3 = SDL_GetHintBoolean("FNA3D_OPENGL_FORCE_ES3", 0);/forceES3 = 1; \/* SDV-WASM: hardcoded ES3 *\//' src/FNA3D_Driver_OpenGL.c
          # Fix 2: set useES3 = 1 (don't rely on SDL_GL_GetAttribute which is broken in emscripten)
          # Note: forceES3 is a local variable in PrepareWindowAttributes, not accessible
          # in OPENGL_CreateDevice. So we hardcode useES3 = 1 directly.
          sed -i 's/renderer->useES3 = (flags & SDL_GL_CONTEXT_PROFILE_ES) != 0;/renderer->useES3 = 1; \/* SDV-WASM: force ES3, SDL_GL_GetAttribute is broken in emscripten *\//' src/FNA3D_Driver_OpenGL.c
          echo "=== Patched forceES3 and useES3 in FNA3D_Driver_OpenGL.c ==="
          grep -n "forceES3\|useES3 =" src/FNA3D_Driver_OpenGL.c | head -10
          
          echo "=== Patched CMakeLists.txt (SDL references) ==="
          grep -n "SDL\|sdlgpu" CMakeLists.txt | head -10
          echo "=== Patched FNA3D.c (drivers) ==="
          grep -n "Driver\|driver" src/FNA3D.c | head -10
          
          mkdir emscripten-build && cd emscripten-build
          emcmake cmake -S .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_PREFIX_PATH=${SDL3_PREFIX} \
            -DSDL3_DIR=${SDL3_PREFIX}/cmake \
            -DCMAKE_C_FLAGS="-pthread -msimd128 -mmutable-globals -msign-ext -mbulk-memory -matomics" \
            -DCMAKE_CXX_FLAGS="-pthread -msimd128 -mmutable-globals -msign-ext -mbulk-memory -matomics" \
            -GNinja
          ninja
          
          # Merge MojoShader .o files into FNA3D.a
          echo "=== Merging MojoShader objects into FNA3D.a ==="
          for f in $(find CMakeFiles/mojoshader.dir -name "*.o" | sort); do
            echo "  Adding: $f"
            ar rcs libFNA3D.a "$f"
          done
          echo "=== FNA3D.a contents (MojoShader) ==="
          ar t libFNA3D.a | grep mojoshader
          cp libFNA3D.a /tmp/FNA3D.a

      - name: Build FAudio
        run: |
          git clone -b ${{ env.FAUDIO_VERSION }} --depth 1 https://github.com/FNA-XNA/FAudio
          cd FAudio
          mkdir emscripten-build && cd emscripten-build
          emcmake cmake -S .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_PREFIX_PATH=${SDL3_PREFIX} \
            -DSDL3_DIR=${SDL3_PREFIX}/cmake \
            -DCMAKE_C_FLAGS="-pthread -msimd128 -mmutable-globals -msign-ext -mbulk-memory -matomics" \
            -DCMAKE_CXX_FLAGS="-pthread -msimd128 -mmutable-globals -msign-ext -mbulk-memory -matomics" \
            -GNinja
          ninja
          cp libFAudio.a /tmp/FAudio.a

      - name: Upload fnalibs
        uses: actions/upload-artifact@v4
        with:
          name: fnalibs-single
          path: |
            /tmp/SDL3.a
            /tmp/FNA3D.a
            /tmp/FAudio.a
          retention-days: 30
