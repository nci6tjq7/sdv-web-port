name: FNA WASM Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.412'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Install ILSpy
        run: dotnet tool install --global ilspycmd --version 8.2.0.7535

      - name: Build custom SDV decompiler
        run: |
          # The custom decompiler uses DecompilerSettings(LanguageVersion.Latest)
          # with ShowDebugInfo=false, which avoids the broken ((Type)(ref VAR))
          # syntax that ilspycmd emits by default (3027 occurrences in SDV).
          dotnet build scripts/decompile-sdv/decompile.csproj -c Release -o /tmp/decompiler

      - name: Clone FNA
        run: |
          git clone --depth 1 https://github.com/FNA-XNA/FNA.git /tmp/FNA
          cd /tmp/FNA && git submodule update --init --recursive

      - name: Patch FNA TitleContainer for HTTP-based Content loading
        run: |
          # Patch FNA source directly (not post-build Cecil) so the AOT compiler
          # sees our changes. Cecil patches on the compiled DLL are lost during
          # .NET WASM AOT compilation because the SDK re-resolves assemblies.
          #
          # Replace TitleContainer.OpenStream to call HttpTitleContainer.OpenStream
          # which uses XMLHttpRequest via JS interop to fetch Content files.
          cat > /tmp/FNA/src/TitleContainer.cs << 'FNAPATCH'
using System;
using System.IO;
using System.Runtime.InteropServices.JavaScript;

namespace Microsoft.Xna.Framework
{
    public static partial class TitleContainer
    {
        public static string Location
        {
            get { return "Content"; }
        }

        public static Stream OpenStream(string name)
        {
            Console.WriteLine("[TitleContainer] OpenStream: " + name);
            string safeName = name.Replace('\\', '/');
            string url = "/deps/" + safeName.TrimStart('/');
            Console.WriteLine("[TitleContainer] Fetching: " + url);
            try
            {
                byte[] data = FetchSync(url);
                Console.WriteLine("[TitleContainer] Got: " + (data == null ? "null" : data.Length + " bytes"));
                if (data == null || data.Length == 0)
                    throw new FileNotFoundException("HTTP fetch failed: " + url, url);
                return new MemoryStream(data);
            }
            catch (Exception ex)
            {
                Console.WriteLine("[TitleContainer] ERROR: " + ex.Message);
                throw;
            }
        }

        [JSImport("globalThis.SDV.fetchSync")]
        private static partial byte[] FetchSync(string url);
    }
}
FNAPATCH
          echo "=== Patched TitleContainer.cs ==="
          head -5 /tmp/FNA/src/TitleContainer.cs

      - name: Scan SDL3-CS for problematic DllImports (diagnostic)
        run: |
          # PREVIOUS APPROACH (REVERTED): we sed-patched all `extern long/ulong`
          # to `extern int/uint` thinking it would fix dotnet/runtime#112262.
          # WRONG: that bug only affects `enum:long/enum:ulong` and multi-field
          # blittable structs >4 bytes. Plain scalar `long`/`ulong` map to i64
          # correctly via SignatureMapper.cs. Patching them to int/uint created
          # a C#/C ABI mismatch (C returns Uint64=i64, C# stub expects i32) →
          # "function signature mismatch" trap on every call_indirect.
          echo "=== SDL3-CS DllImports using long/ulong (OK — plain scalar maps to i64) ==="
          grep -rEn "extern\s+(ulong|long)\b" /tmp/FNA/lib/SDL3-CS --include="*.cs" | head -30
          echo ""
          echo "=== enum:long / enum:ulong used in DllImports (REAL #112262 trigger) ==="
          grep -rEn "enum\s+\w+\s*:\s*(long|ulong)\b" /tmp/FNA/lib/SDL3-CS --include="*.cs" || echo "None found"
          echo ""
          echo "=== FNA source long/ulong DllImports (OK — plain scalar) ==="
          grep -rEn "extern\s+(ulong|long)\b" /tmp/FNA/src --include="*.cs" | head -20

      - name: Patch SDL3-CS to work around dotnet/runtime#112262 (enum:ulong in DllImport)
        run: |
          # The real #112262 trigger: `enum SDL_WindowFlags : ulong` is used in 4 DllImports.
          # SignatureMapper.cs maps enum:ulong incorrectly (i32 instead of i64) → trap.
          # Maintainer's workaround: cast enum:ulong → ulong directly in DllImport signatures.
          # This script:
          #   1. Changes SDL_WindowFlags → ulong in 4 DllImports
          #   2. Casts at call sites for the 2 private DllImports
          #   3. Adds public wrappers for the 2 public DllImports (SDL_CreatePopupWindow,
          #      SDL_GetWindowFlags) so FNA-side callers using SDL_WindowFlags still work
          python3 ${{ github.workspace }}/scripts/patch-sdl3-windowflags.py /tmp/FNA/lib/SDL3-CS/SDL3/SDL3.Legacy.cs
          # Verify the patch applied
          grep -c "INTERNAL_SDL_GetWindowFlags\|INTERNAL_SDL_CreatePopupWindow" /tmp/FNA/lib/SDL3-CS/SDL3/SDL3.Legacy.cs

      - name: Build FNA
        run: dotnet build /tmp/FNA/FNA.Core.csproj -c Release

      - name: Build MG Facade
        run: |
          mkdir -p /tmp/mg-facade-fna /tmp/extract-fna-types
          cat > /tmp/mg-facade-fna/MonoGame.Framework.csproj << 'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup><AssemblyName>MonoGame.Framework</AssemblyName><OutputType>Library</OutputType><TargetFramework>net8.0</TargetFramework><Version>3.6.0.862</Version></PropertyGroup>
            <ItemGroup><ProjectReference Include="/tmp/FNA/FNA.Core.csproj" /></ItemGroup>
          </Project>
          EOF
          cat > /tmp/extract-fna-types/Program.cs << 'EOF'
          using System;using System.Linq;using System.IO;using System.Text;using Mono.Cecil;
          class P{static void Main(string[]a){var sb=new StringBuilder();sb.AppendLine("using System.Runtime.CompilerServices;");sb.AppendLine();var asm=AssemblyDefinition.ReadAssembly(a[0]);var s=new System.Collections.Generic.HashSet<string>();foreach(var t in asm.MainModule.Types){if(!t.IsPublic||t.FullName.StartsWith("<")||t.FullName.StartsWith("_"))continue;if(string.IsNullOrEmpty(t.Namespace)||s.Contains(t.FullName))continue;s.Add(t.FullName);if(t.HasGenericParameters)continue;sb.AppendLine("[assembly: TypeForwardedTo(typeof("+t.FullName+"))]");}File.WriteAllText(a[1],sb.ToString());Console.WriteLine("Generated "+s.Count+" forwarders");}}
          EOF
          cat > /tmp/extract-fna-types/e.csproj << 'EOF'
          <Project Sdk="Microsoft.NET.Sdk"><PropertyGroup><OutputType>Exe</OutputType><TargetFramework>net8.0</TargetFramework></PropertyGroup><ItemGroup><PackageReference Include="Mono.Cecil" Version="0.11.5"/></ItemGroup></Project>
          EOF
          cd /tmp/extract-fna-types && dotnet run -- "/tmp/FNA/bin/Release/net8.0/FNA.dll" /tmp/mg-facade-fna/Forwarders.cs
          cd /tmp/mg-facade-fna && dotnet build

      - name: Download SDV DLL and dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "/tmp/sdv-extract/Stardew Valley"

          # Private repo: releases/download URLs return 404 without auth.
          # Use the assets API endpoint with Accept: application/octet-stream.
          RELEASE_TAG="sdv-dlls-v1"
          API="https://api.github.com/repos/${{ github.repository }}/releases/tags/${RELEASE_TAG}"

          echo "Fetching release metadata for ${RELEASE_TAG}..."
          ASSETS_JSON=$(curl -s -H "Authorization: token ${GH_TOKEN}" "${API}")

          SDV_DLL_URL=$(echo "${ASSETS_JSON}" | python3 -c "import json,sys; r=json.load(sys.stdin); print(next(a['url'] for a in r['assets'] if a['name']=='StardewValley.dll'))")
          DEPS_ZIP_URL=$(echo "${ASSETS_JSON}" | python3 -c "import json,sys; r=json.load(sys.stdin); print(next(a['url'] for a in r['assets'] if a['name']=='sdv-deps.zip'))")

          echo "Downloading StardewValley.dll from ${SDV_DLL_URL}..."
          curl -sL -H "Authorization: token ${GH_TOKEN}" \
               -H "Accept: application/octet-stream" \
               "${SDV_DLL_URL}" -o "/tmp/sdv-extract/Stardew Valley/Stardew Valley.dll"

          echo "Downloading sdv-deps.zip from ${DEPS_ZIP_URL}..."
          curl -sL -H "Authorization: token ${GH_TOKEN}" \
               -H "Accept: application/octet-stream" \
               "${DEPS_ZIP_URL}" -o /tmp/sdv-deps.zip

          file "/tmp/sdv-extract/Stardew Valley/Stardew Valley.dll"
          file /tmp/sdv-deps.zip
          unzip -o /tmp/sdv-deps.zip -d "/tmp/sdv-extract/Stardew Valley/"

          # Verify
          ls -la "/tmp/sdv-extract/Stardew Valley/Stardew Valley.dll"
          ls "/tmp/sdv-extract/Stardew Valley/"*.dll | wc -l
          echo "DLLs downloaded"

      - name: Decompile SDV
        run: |
          mkdir -p /tmp/sdv-fna-src
          dotnet /tmp/decompiler/decompile-sdv.dll \
                 "/tmp/sdv-extract/Stardew Valley/Stardew Valley.dll" \
                 /tmp/sdv-fna-src
          rm -f "/tmp/sdv-fna-src/Stardew Valley.csproj"
          echo "Decompiled: $(find /tmp/sdv-fna-src -name '*.cs' | wc -l) files"
          # NOTE: ILSpy emits ((Type)(ref VAR)) patterns for value-type constrained
          # callvirt — these are invalid C# but cleaned up by patch-sdv-fna.sh.

      - name: Patch SDV source for FNA
        run: bash scripts/patch-sdv-fna.sh /tmp/sdv-fna-src

      - name: Verify no broken ILSpy patterns remain
        run: |
          BAD_REF=$(grep -rE '\(\([A-Za-z_][A-Za-z0-9_.]*\)\(ref\s+[^)]+\)\)' /tmp/sdv-fna-src/ | wc -l)
          BAD_NULL=$(grep -rE '\(\(\?\?\)[^)]+\)' /tmp/sdv-fna-src/ | wc -l)
          echo "Broken (ref X) patterns: $BAD_REF"
          echo "Broken ((??)X) patterns: $BAD_NULL"
          if [ "$BAD_REF" -gt 0 ] || [ "$BAD_NULL" -gt 0 ]; then
            echo "FAIL: patch script did not clean all broken patterns"
            exit 1
          fi

      - name: Build SDV with FNA
        run: |
          cd /tmp/sdv-fna-src
          rm -rf bin obj
          dotnet build
          echo "SDV errors: $(dotnet build 2>&1 | grep 'error CS' | wc -l)"
          ls -la "bin/Debug/net8.0/Stardew Valley.dll"

      - name: Download FNA WASM native libs
        run: |
          mkdir -p /tmp/fnalibs
          STATICS_RELEASE="5ca6e290-3dbe-49dd-b7f8-647e3af0a709"
          wget -q "https://github.com/r58Playz/FNA-WASM-Build/releases/download/${STATICS_RELEASE}/SDL3.a" -O /tmp/fnalibs/SDL3.a || echo "SDL3 download failed"
          wget -q "https://github.com/r58Playz/FNA-WASM-Build/releases/download/${STATICS_RELEASE}/FNA3D.a" -O /tmp/fnalibs/FNA3D.a || echo "FNA3D download failed"
          wget -q "https://github.com/r58Playz/FNA-WASM-Build/releases/download/${STATICS_RELEASE}/FAudio.a" -O /tmp/fnalibs/FAudio.a || echo "FAudio download failed"
          wget -q "https://github.com/r58Playz/FNA-WASM-Build/releases/download/${STATICS_RELEASE}/libmojoshader.a" -O /tmp/fnalibs/libmojoshader.a || echo "libmojoshader download failed"
          ls -la /tmp/fnalibs/

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdv-fna-build
          path: |
            /tmp/sdv-fna-src/bin/Debug/net8.0/
            /tmp/FNA/bin/Release/net8.0/FNA.dll
            /tmp/mg-facade-fna/bin/Debug/net8.0/MonoGame.Framework.dll
            /tmp/fnalibs/
            /tmp/sdv-extract/Stardew Valley/*.dll
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/sdv-fna-src/
          retention-days: 7
# trigger workflow rescan
# cache bust
