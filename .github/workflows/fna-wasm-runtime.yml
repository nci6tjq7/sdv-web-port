name: FNA WASM Runtime Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/SdvWebPort.FnaRuntime/**'
      - '.github/workflows/fna-wasm-runtime.yml'

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.303'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Download SDV+FNA build artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p download/sdv-fna-build
          # Find the latest successful FNA WASM Build run
          API="https://api.github.com/repos/${{ github.repository }}/actions/workflows/fna-wasm-build.yml/runs?status=completed&conclusion=success&per_page=1"
          echo "Fetching latest successful FNA WASM Build run..."
          RUN_DATA=$(curl -s -H "Authorization: token ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "${API}")
          echo "API response (first 500 chars): ${RUN_DATA:0:500}"
          RUN_ID=$(echo "$RUN_DATA" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          runs = d.get('workflow_runs', [])
          if not runs:
              print('ERROR: no runs found', file=sys.stderr)
              sys.exit(1)
          print(runs[0]['id'])
          ")
          echo "Found run ID: ${RUN_ID}"

          # Get artifact ID
          ARTIFACTS=$(curl -s -H "Authorization: token ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts")
          ARTIFACT_ID=$(echo "$ARTIFACTS" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for a in d.get('artifacts',[]):
              if a['name']=='sdv-fna-build':
                  print(a['id']); break
          ")
          echo "Artifact ID: ${ARTIFACT_ID}"

          # Download via API - the endpoint returns a redirect to blob storage.
          # We must NOT send the Authorization header to the redirect target.
          # Use -L to follow redirects, but strip auth on redirect.
          curl -sL -H "Authorization: token ${GH_TOKEN}" \
               -H "Accept: application/vnd.github+json" \
               "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" \
               -o download/sdv-fna-build.zip
          echo "Downloaded file type:"
          file download/sdv-fna-build.zip
          # If it's JSON (error), show it and fail
          if file download/sdv-fna-build.zip | grep -q "JSON\|text"; then
            echo "ERROR: Downloaded file is not a zip. Content:"
            cat download/sdv-fna-build.zip
            exit 1
          fi
          cd download/sdv-fna-build
          unzip -q ../sdv-fna-build.zip
          ls -la

      - name: Verify artifact contents
        run: |
          ls -la download/sdv-fna-build/
          ls -la download/sdv-fna-build/sdv-fna-src/bin/Debug/net8.0/ | head -5
          test -f download/sdv-fna-build/sdv-fna-src/bin/Debug/net8.0/Stardew\ Valley.dll
          test -f download/sdv-fna-build/sdv-fna-src/bin/Debug/net8.0/FNA.dll

      - name: Download freshly compiled fnalibs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p download/fnalibs
          # Find the latest successful fnalibs build run
          API="https://api.github.com/repos/${{ github.repository }}/actions/workflows/build-fnalibs.yml/runs?status=completed&conclusion=success&per_page=1"
          RUN_DATA=$(curl -s -H "Authorization: token ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "${API}")
          RUN_ID=$(echo "$RUN_DATA" | python3 -c "import json,sys; print(json.load(sys.stdin)['workflow_runs'][0]['id'])")
          echo "fnalibs build run ID: ${RUN_ID}"

          ARTIFACTS=$(curl -s -H "Authorization: token ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts")
          ARTIFACT_ID=$(echo "$ARTIFACTS" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for a in d.get('artifacts',[]):
              if 'single' in a['name']:
                  print(a['id']); break
          ")
          echo "Artifact ID: ${ARTIFACT_ID}"

          REDIRECT=$(curl -s -H "Authorization: token ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -o /dev/null -w '%{redirect_url}' \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip")
          curl -sL "$REDIRECT" -o download/fnalibs.zip
          cd download/fnalibs
          unzip -q ../fnalibs.zip
          ls -la

      - name: Copy native libs to runtime project
        run: |
          mkdir -p src/SdvWebPort.FnaRuntime/native
          cp download/fnalibs/*.a src/SdvWebPort.FnaRuntime/native/
          ls -la src/SdvWebPort.FnaRuntime/native/

      - name: Setup Emscripten for C stub compilation
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.56'

      - name: Compile MojoShader export stub and merge into FNA3D.a
        run: |
          cd src/SdvWebPort.FnaRuntime/native
          emcc -c mojoshader_exports.c -o mojoshader_exports.o -O2
          # Extract all FNA3D object files, add our stub, re-archive.
          # This forces the linker to include ALL FNA3D symbols because
          # mojoshader_exports.o (which references them) is in the same archive.
          mkdir fna3d_extract
          cd fna3d_extract
          ar x ../FNA3D.a
          cp ../mojoshader_exports.o .
          ar rcs ../FNA3D.a *.o
          cd ..
          rm -rf fna3d_extract
          echo "FNA3D.a now contains mojoshader_exports.o:"
          ar t FNA3D.a | grep mojoshader

      - name: Build WASM runtime
        env:
          EMCC_CFLAGS: "-Wl,--no-import-undefined -Wl,--export=MOJOSHADER_sdlGetShaderFormats -Wl,--export=MOJOSHADER_sdlCompileShader -Wl,--export=MOJOSHADER_sdlGetShaderProfile -Wl,--export=MOJOSHADER_sdlDestroyShader -Wl,--export=MOJOSHADER_sdlBindShaders -Wl,--export=MOJOSHADER_sdlGetBoundShaderProgram -Wl,--export=MOJOSHADER_sdlBindProgram -Wl,--export=MOJOSHADER_sdlMapUniformBuffer -Wl,--export=MOJOSHADER_sdlUnmapUniformBuffer -Wl,--export=MOJOSHADER_sdlGetUniformData -Wl,--export=MOJOSHADER_sdlGetVertexData -Wl,--export=MOJOSHADER_sdlGetPixelData -Wl,--export=MOJOSHADER_sdlDestroyEffect -Wl,--export=MOJOSHADER_sdlCreateEffect -Wl,--export=MOJOSHADER_sdlCreateEffectRaw -Wl,--export=MOJOSHADER_sdlEffectBeginPass -Wl,--export=MOJOSHADER_sdlEffectEndPass -Wl,--export=MOJOSHADER_sdlEffectCommitChanges -Wl,--export=MOJOSHADER_sdlEffectEnd -Wl,--export=MOJOSHADER_sdlEffectSetTechnique -Wl,--export=MOJOSHADER_sdlEffectGetCurrentTechnique -Wl,--export=MOJOSHADER_sdlEffectGetTechnique -Wl,--export=MOJOSHADER_sdlEffectGetTechniqueName -Wl,--export=MOJOSHADER_sdlEffectGetNumTechniques -Wl,--export=MOJOSHADER_sdlEffectGetNumPasses -Wl,--export=MOJOSHADER_sdlEffectGetPassName -Wl,--export=MOJOSHADER_sdlGetAttribMappings -Wl,--export=MOJOSHADER_sdlGetUniformMappings -Wl,--export=MOJOSHADER_sdlShaderBinaryToSPIRV"
        run: |
          cd src/SdvWebPort.FnaRuntime
          dotnet publish -c Release -o /tmp/wasm-publish
          ls -la /tmp/wasm-publish/
          ls -la /tmp/wasm-publish/wwwroot/ | head -20
          echo "=== WASM bundle size ==="
          du -sh /tmp/wasm-publish/wwwroot/

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdv-fna-wasm
          path: /tmp/wasm-publish/wwwroot/
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build-logs
          path: src/SdvWebPort.FnaRuntime/
          retention-days: 7
