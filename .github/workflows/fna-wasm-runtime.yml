name: FNA WASM Runtime Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/SdvWebPort.FnaRuntime/**'
      - '.github/workflows/fna-wasm-runtime.yml'
      - 'global.json'

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.100-preview.5.25277.114'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Download SDV+FNA build artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p download/sdv-fna-build
          API="https://api.github.com/repos/${{ github.repository }}/actions/workflows/fna-wasm-build.yml/runs?status=completed&conclusion=success&per_page=1"
          RUN_DATA=$(curl -s -H "Authorization: token ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "${API}")
          RUN_ID=$(echo "$RUN_DATA" | python3 -c "import json,sys; d=json.load(sys.stdin); runs = d.get('workflow_runs', []); print(runs[0]['id'] if runs else '')")
          echo "Found run ID: ${RUN_ID}"
          ARTIFACTS=$(curl -s -H "Authorization: token ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts")
          ARTIFACT_ID=$(echo "$ARTIFACTS" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for a in d.get('artifacts',[]):
              if a['name']=='sdv-fna-build':
                  print(a['id']); break
          ")
          echo "Artifact ID: ${ARTIFACT_ID}"
          REDIRECT=$(curl -s -H "Authorization: token ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -o /dev/null -w '%{redirect_url}' \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip")
          curl -sL "$REDIRECT" -o download/sdv-fna-build.zip
          file download/sdv-fna-build.zip
          if file download/sdv-fna-build.zip | grep -q "JSON\|text"; then exit 1; fi
          cd download/sdv-fna-build
          unzip -q ../sdv-fna-build.zip
          ls -la

      - name: Verify SDV+FNA artifact
        run: |
          test -f download/sdv-fna-build/sdv-fna-src/bin/Debug/net8.0/Stardew\ Valley.dll
          test -f download/sdv-fna-build/sdv-fna-src/bin/Debug/net8.0/FNA.dll

      - name: Download pre-built fnalibs from r58Playz (threaded)
        run: |
          mkdir -p download/fnalibs
          # Use r58Playz's pre-built fnalibs — proven by celeste-wasm.
          # Their FNA3D.a is upstream + minimal patches (SDLGPU removed, pthread added).
          # We do NOT need to build FNA3D from source — the ES3 issue is fixed by
          # EmccExtraLDFlags="-sMIN_WEBGL_VERSION=2" in the csproj, not by patching FNA3D.
          RELEASE="37a2ca3d-6f0d-4d76-91f7-d23f0ca7121b"
          BASE="https://github.com/r58Playz/FNA-WASM-Build/releases/download/${RELEASE}"
          curl -sL "${BASE}/SDL3.a" -o download/fnalibs/SDL3.a
          curl -sL "${BASE}/FNA3D.a" -o download/fnalibs/FNA3D.a
          curl -sL "${BASE}/FAudio.a" -o download/fnalibs/FAudio.a
          curl -sL "${BASE}/libmojoshader.a" -o download/fnalibs/libmojoshader.a
          ls -la download/fnalibs/

      - name: Download and FULLY install patched .NET runtime from r58Playz
        run: |
          # Download patched runtime
          mkdir -p download/dotnet-patched
          RELEASE="37a2ca3d-6f0d-4d76-91f7-d23f0ca7121b"
          curl -sL "https://github.com/r58Playz/FNA-WASM-Build/releases/download/${RELEASE}/dotnet.zip" -o download/dotnet-patched/dotnet.zip
          cd download/dotnet-patched && unzip -q dotnet.zip

          # 1. Replace WasmAppBuilder.dll (patched PInvokeTableGenerator)
          find /usr/share/dotnet/packs -name "WasmAppBuilder.dll" -exec cp tasks/net10.0/WasmAppBuilder.dll {} \;

          # 2. Restore NuGet packages
          cd ${{ github.workspace }}/src/SdvWebPort.FnaRuntime
          dotnet restore 2>/dev/null || true

          # 3. Replace native/ and lib/ directories (NOT build/ which has manifest)
          # The patched runtime has native/ and lib/ but not build/.
          # Keep build/ from stock runtime for RuntimeComponentManifest.json.
          find /home/runner/.nuget/packages -path "*/runtimes/browser-wasm/native" -type d 2>/dev/null | while read dir; do
            echo "Replacing native: $dir"
            rm -rf "$dir"
            cp -r ${{ github.workspace }}/download/dotnet-patched/runtimes/browser-wasm/native "$dir"
          done
          find /home/runner/.nuget/packages -path "*/runtimes/browser-wasm/lib" -type d 2>/dev/null | while read dir; do
            echo "Replacing lib: $dir"
            rm -rf "$dir"
            cp -r ${{ github.workspace }}/download/dotnet-patched/runtimes/browser-wasm/lib "$dir"
          done

          # 4. Also replace SDK pack runtime
          find /usr/share/dotnet/packs -path "*/runtimes/browser-wasm/native" -type d 2>/dev/null | while read dir; do
            rm -rf "$dir"
            cp -r ${{ github.workspace }}/download/dotnet-patched/runtimes/browser-wasm/native "$dir"
          done
          find /usr/share/dotnet/packs -path "*/runtimes/browser-wasm/lib" -type d 2>/dev/null | while read dir; do
            rm -rf "$dir"
            cp -r ${{ github.workspace }}/download/dotnet-patched/runtimes/browser-wasm/lib "$dir"
          done

          echo "=== Verify patched libmonosgen ==="
          find /home/runner/.nuget -name "libmonosgen-2.0.a" -exec ls -la {} \; 2>/dev/null | head -3
          echo "=== Verify WASM_N2M_AOT_DIRECT_ARG ==="
          find /home/runner/.nuget -name "pinvoke.h" -path "*/include/wasm/*" -exec grep -l "WASM_N2M_AOT_DIRECT_ARG" {} \; 2>/dev/null | head -3
          echo "=== Verify emcc-link.rsp has --shared-memory ==="
          find /home/runner/.nuget -name "emcc-link.rsp" -exec grep "shared-memory" {} \; 2>/dev/null | head -3

      - name: Copy native libs to runtime project
        run: |
          mkdir -p src/SdvWebPort.FnaRuntime/native
          # Copy all fnalibs from r58Playz (SDL3.a, FNA3D.a, FAudio.a, libmojoshader.a).
          # r58Playz's FNA3D.a does NOT include MojoShader (unlike our build-fnalibs),
          # so libmojoshader.a is needed separately.
          cp download/fnalibs/*.a src/SdvWebPort.FnaRuntime/native/
          ls -la src/SdvWebPort.FnaRuntime/native/

      - name: Build strip-pinvokes tool and stub GalaxyCSharp/Steamworks.NET
        run: |
          # SDV's LocalMultiplayer.GetStaticFieldsAndDefaults() uses reflection to scan
          # ALL types in ALL loaded assemblies. Without GalaxyCSharp/Steamworks.NET,
          # it throws ReflectionTypeLoadException.
          # But the original DLLs have [MonoPInvokeCallback] methods with non-blittable
          # enum parameters (e.g. Galaxy.Api.IError+Type) which cause WASM build to fail.
          # Fix: use Mono.Cecil to strip all P/Invoke info, keeping type definitions.
          #
          # CRITICAL: output filename MUST match original (GalaxyCSharp.dll, not .stub.dll).
          # The .NET WASM SDK uses filename (without extension) as the logical assembly name.
          # SDV's reflection scan looks for assembly named "GalaxyCSharp" — the [AssemblyName]
          # attribute inside is preserved by Mono.Cecil, but the SDK uses the filename.
          dotnet build scripts/strip-pinvokes/strip-pinvokes.csproj -c Release -o /tmp/strip-pinvokes
          cd "download/sdv-fna-build/sdv-extract/Stardew Valley"
          cp GalaxyCSharp.dll GalaxyCSharp.orig.dll
          cp Steamworks.NET.dll Steamworks.NET.orig.dll
          dotnet /tmp/strip-pinvokes/strip-pinvokes.dll GalaxyCSharp.orig.dll GalaxyCSharp.dll
          dotnet /tmp/strip-pinvokes/strip-pinvokes.dll Steamworks.NET.orig.dll Steamworks.NET.dll
          ls -la GalaxyCSharp.dll Steamworks.NET.dll

      - name: Patch SDV to NOP Reflection.Emit usage
        run: |
          # SDV's LocalMultiplayer.GenerateDynamicMethodsForStatics() uses Reflection.Emit
          # (DynamicMethod, ILGenerator) to generate static field accessors at runtime.
          # This throws PlatformNotSupportedException in WASM (no JIT).
          # Patch to NOP — the generated methods are only used for save serialization
          # (not needed for the title screen demo).
          dotnet build scripts/patch-sdv-noemit/patch-sdv-noemit.csproj -c Release -o /tmp/patch-sdv-noemit
          cd "download/sdv-fna-build/sdv-fna-src/bin/Debug/net8.0"
          cp "Stardew Valley.dll" "Stardew Valley.orig.dll"
          dotnet /tmp/patch-sdv-noemit/patch-sdv-noemit.dll "Stardew Valley.orig.dll" "Stardew Valley.dll"
          ls -la "Stardew Valley.dll"

      - name: Build WASM runtime (no restore - use patched packages)
        run: |
          cd src/SdvWebPort.FnaRuntime
          # Clean bin AND obj to ensure EmccExtraLDFlags are picked up fresh
          # (stale obj/ can cache old emcc-link.rsp without our flags)
          rm -rf bin obj
          dotnet restore --no-cache
          dotnet publish -c Release -o /tmp/wasm-publish
          ls -la /tmp/wasm-publish/
          ls -la /tmp/wasm-publish/wwwroot/ | head -20
          echo "=== WASM bundle size ==="
          du -sh /tmp/wasm-publish/wwwroot/

      - name: Patch dotnet.native.js for canvas transfer (celeste-wasm 1-line sed)
        run: |
          # Celeste-wasm pattern (research-10): inject transferredCanvasNames=[".canvas"]
          # right after 'var offscreenCanvases = {};' in dotnet.native.*.js.
          # This tells emscripten's pthread bootstrap to automatically transfer
          # the canvas element (matched by CSS class "canvas") to the deputy worker.
          # The canvas must have class="canvas" in index.html (already set).
          #
          # This is much simpler than our previous 250-line patch-canvas-transfer.py
          # and is the proven approach from celeste-wasm.
          cd /tmp/wasm-publish/wwwroot/_framework
          echo "=== Before patch ==="
          grep -c "transferredCanvasNames" dotnet.native.*.js || echo "(not found)"
          sed -i 's/var offscreenCanvases \?= \?{};/var offscreenCanvases={};if(globalThis.window\&\&!window.TRANSFERRED_CANVAS){transferredCanvasNames=[".canvas"];window.TRANSFERRED_CANVAS=true;}/' dotnet.native.*.js
          echo "=== After patch ==="
          grep -c "transferredCanvasNames" dotnet.native.*.js
          echo "=== Verify ==="
          grep -o "transferredCanvasNames=\[\".canvas\"\]" dotnet.native.*.js | head -1

      - name: Verify EmccExtraLDFlags are in emcc-link.rsp
        run: |
          # Verify that -sMIN_WEBGL_VERSION=2 and -sOFFSCREENCANVAS_SUPPORT are
          # present in the emcc link response file.
          echo "=== Find emcc-link.rsp ==="
          find /home/runner/work -name "emcc-link.rsp" 2>/dev/null | head -5
          echo ""
          echo "=== Check for MIN_WEBGL_VERSION in all .rsp files ==="
          find /home/runner/work -name "*.rsp" -exec grep -l "MIN_WEBGL_VERSION" {} \; 2>/dev/null || echo "(NOT FOUND — EmccExtraLDFlags not applied!)"
          echo "=== Check for OFFSCREENCANVAS_SUPPORT ==="
          find /home/runner/work -name "*.rsp" -exec grep -l "OFFSCREENCANVAS_SUPPORT" {} \; 2>/dev/null || echo "(NOT FOUND — EmccExtraLDFlags not applied!)"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdv-fna-wasm
          path: /tmp/wasm-publish/wwwroot/
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build-logs
          path: src/SdvWebPort.FnaRuntime/
          retention-days: 7
