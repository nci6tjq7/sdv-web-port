name: AOT Build

on:
  workflow_dispatch:
    inputs:
      sdv_zip_url:
        description: 'Direct download URL for SDV zip (leave empty for standard build)'
        required: false
        default: ''
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.412'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Restore NuGet packages
        run: dotnet restore src/SdvWebPort.PoC.SdvBlazor/SdvWebPort.PoC.SdvBlazor.csproj

      - name: Patch KNI NuGet DLLs
        run: |
          export PATH="$PATH:$HOME/.dotnet"
          NUGET_DIR="$HOME/.nuget/packages"
          
          # Create patcher project
          mkdir -p /tmp/kni-patcher
          cat > /tmp/kni-patcher/Program.cs << 'EOF'
          using System;using System.Linq;using Mono.Cecil;using Mono.Cecil.Cil;
          class P{
            static void Main(string[] args){
              // Patch Graphics
              var gfxPath = args[0];
              Console.WriteLine("Patching Graphics: " + gfxPath);
              using(var gfxAsm = AssemblyDefinition.ReadAssembly(gfxPath)){
                foreach(var t in gfxAsm.MainModule.Types){
                  foreach(var m in t.Methods){
                    if(m.Name=="IsProfileSupported"||m.Name=="Platform_IsProfileSupported"||m.Name=="get_IsProfileSupported"){
                      try{m.Body.Instructions.Clear();m.Body.Instructions.Add(Instruction.Create(OpCodes.Ldc_I4_1));m.Body.Instructions.Add(Instruction.Create(OpCodes.Ret));Console.WriteLine("  Patched "+t.Name+"."+m.Name);}catch{}
                    }
                  }
                }
                gfxAsm.Write(gfxPath+".tmp");
              }
              System.IO.File.Move(gfxPath+".tmp", gfxPath, true);
              
              // Patch Game
              var gamePath = args[1];
              Console.WriteLine("Patching Game: " + gamePath);
              using(var gameAsm = AssemblyDefinition.ReadAssembly(gamePath)){
                var g = gameAsm.MainModule.Types.FirstOrDefault(t=>t.FullName=="Microsoft.Xna.Framework.Game");
                if(g!=null) foreach(var n in new[]{"Initialize","UnloadContent","Update","Draw"}){
                  var m = g.Methods.FirstOrDefault(x=>x.Name==n);
                  if(m!=null && m.IsFamilyOrAssembly){m.IsFamilyOrAssembly=false; m.IsFamily=true; Console.WriteLine("  Patched Game."+n);}
                }
                gameAsm.Write(gamePath+".tmp");
              }
              System.IO.File.Move(gamePath+".tmp", gamePath, true);
              Console.WriteLine("Done!");
            }
          }
          EOF
          cat > /tmp/kni-patcher/p.csproj << 'EOF'
          <Project Sdk="Microsoft.NET.Sdk"><PropertyGroup><OutputType>Exe</OutputType><TargetFramework>net8.0</TargetFramework></PropertyGroup><ItemGroup><PackageReference Include="Mono.Cecil" Version="0.11.5"/></ItemGroup></Project>
          EOF
          
          # Find DLLs
          GFX_DLL=$(find "$NUGET_DIR/nkast.xna.framework.graphics" -name "Xna.Framework.Graphics.dll" -path "*/net8.0/*" 2>/dev/null | head -1)
          GAME_DLL=$(find "$NUGET_DIR/nkast.xna.framework.game" -name "Xna.Framework.Game.dll" -path "*/net8.0/*" 2>/dev/null | head -1)
          
          if [ -z "$GFX_DLL" ] || [ -z "$GAME_DLL" ]; then
            echo "ERROR: Could not find KNI DLLs in NuGet cache"
            find "$NUGET_DIR/nkast.xna.framework.graphics" -name "*.dll" 2>/dev/null
            find "$NUGET_DIR/nkast.xna.framework.game" -name "*.dll" 2>/dev/null
            exit 1
          fi
          
          cd /tmp/kni-patcher
          dotnet run -- "$GFX_DLL" "$GAME_DLL"
          
          # Clear NuGet HTTP cache
          dotnet nuget locals http-cache --clear 2>/dev/null || true
          echo "KNI DLLs patched successfully"

      - name: Publish with AOT
        run: dotnet publish src/SdvWebPort.PoC.SdvBlazor/SdvWebPort.PoC.SdvBlazor.csproj -c Release -p:RunAOTCompilation=true --no-restore
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: 1

      - name: Upload AOT artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdv-web-port-aot
          path: src/SdvWebPort.PoC.SdvBlazor/bin/Release/net8.0/publish/wwwroot/
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            src/SdvWebPort.PoC.SdvBlazor/obj/Release/net8.0/wasm/
          retention-days: 7
