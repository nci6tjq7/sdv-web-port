name: AOT Build (Source-Compiled SDV)

on:
  workflow_dispatch:
    inputs:
      sdv_zip_url:
        description: 'Direct download URL for SDV zip (leave empty for standard build)'
        required: false
        default: ''
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.412'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Install ILSpy decompiler
        run: dotnet tool install --global ilspycmd --version 8.2.0.7535

      - name: Patch KNI DLLs
        run: |
          export PATH="$PATH:$HOME/.dotnet"
          KNI_DIR="src/SdvWebPort.PoC.SdvBlazor/wwwroot/deps/kni"
          # Patch Game method visibility
          mkdir -p /tmp/kni-patcher /tmp/kni-patched
          cp "$KNI_DIR"/*.dll /tmp/kni-patched/
          cat > /tmp/kni-patcher/Program.cs << 'EOF'
          using System;using System.Linq;using Mono.Cecil;
          class P{static void Main(string[] a){
            var asm=AssemblyDefinition.ReadAssembly(a[0]);
            var g=asm.MainModule.Types.FirstOrDefault(t=>t.FullName=="Microsoft.Xna.Framework.Game");
            if(g==null)return;
            foreach(var n in new[]{"Initialize","UnloadContent","Update","Draw"}){
              var m=g.Methods.FirstOrDefault(x=>x.Name==n);
              if(m!=null&&m.IsFamilyOrAssembly){m.IsFamilyOrAssembly=false;m.IsFamily=true;}
            }
            asm.Write(a[1]);
          }}
          EOF
          cat > /tmp/kni-patcher/p.csproj << 'EOF'
          <Project Sdk="Microsoft.NET.Sdk"><PropertyGroup><OutputType>Exe</OutputType><TargetFramework>net8.0</TargetFramework></PropertyGroup><ItemGroup><PackageReference Include="Mono.Cecil" Version="0.11.5"/></ItemGroup></Project>
          EOF
          cd /tmp/kni-patcher
          dotnet run -- "$KNI_DIR/Xna.Framework.Game.dll" "/tmp/kni-patched/Xna.Framework.Game.dll"
          echo "KNI Game patched"

      - name: Download and decompile SDV (if zip URL provided)
        if: ${{ github.event.inputs.sdv_zip_url != '' }}
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools:$HOME/.dotnet"
          export DOTNET_ROLL_FORWARD=LatestMajor
          mkdir -p /tmp/sdv-extract /tmp/sdv-src
          wget -q "${{ github.event.inputs.sdv_zip_url }}" -O /tmp/sdv.zip
          unzip -o /tmp/sdv.zip -d /tmp/sdv-extract
          ls "/tmp/sdv-extract/Stardew Valley/Stardew Valley.dll"
          ilspycmd "/tmp/sdv-extract/Stardew Valley/Stardew Valley.dll" -p -o /tmp/sdv-src
          rm -f "/tmp/sdv-src/Stardew Valley.csproj"
          echo "Decompiled: $(find /tmp/sdv-src -name '*.cs' | wc -l) files"

      - name: Build MG facade and source-compiled SDV (if zip URL provided)
        if: ${{ github.event.inputs.sdv_zip_url != '' }}
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools:$HOME/.dotnet"
          KNI_DIR="src/SdvWebPort.PoC.SdvBlazor/wwwroot/deps/kni"
          SDV_DIR="/tmp/sdv-extract/Stardew Valley"
          
          # Build MG facade
          mkdir -p /tmp/mg-facade /tmp/extract-types
          cat > /tmp/mg-facade/MonoGame.Framework.csproj << EOF
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup><AssemblyName>MonoGame.Framework</AssemblyName><OutputType>Library</OutputType><TargetFramework>net8.0</TargetFramework><Version>3.6.0.862</Version></PropertyGroup>
            <ItemGroup>
              <Reference Include="Xna.Framework"><HintPath>$KNI_DIR/Xna.Framework.dll</HintPath></Reference>
              <Reference Include="Xna.Framework.Game"><HintPath>/tmp/kni-patched/Xna.Framework.Game.dll</HintPath></Reference>
              <Reference Include="Xna.Framework.Graphics"><HintPath>$KNI_DIR/Xna.Framework.Graphics.dll</HintPath></Reference>
              <Reference Include="Xna.Framework.Content"><HintPath>$KNI_DIR/Xna.Framework.Content.dll</HintPath></Reference>
              <Reference Include="Xna.Framework.Input"><HintPath>$KNI_DIR/Xna.Framework.Input.dll</HintPath></Reference>
              <Reference Include="Xna.Framework.Audio"><HintPath>$KNI_DIR/Xna.Framework.Audio.dll</HintPath></Reference>
              <Reference Include="Xna.Framework.Media"><HintPath>$KNI_DIR/Xna.Framework.Media.dll</HintPath></Reference>
            </ItemGroup>
          </Project>
          EOF
          cat > /tmp/extract-types/Program.cs << 'CSEOF'
          using System;using System.Linq;using System.IO;using System.Text;using Mono.Cecil;
          class P{static void Main(string[]a){
            var sb=new StringBuilder();sb.AppendLine("using System.Runtime.CompilerServices;");sb.AppendLine();
            var d=a[0];var dlls=new[]{"Xna.Framework.dll","Xna.Framework.Game.dll","Xna.Framework.Graphics.dll","Xna.Framework.Content.dll","Xna.Framework.Input.dll","Xna.Framework.Audio.dll","Xna.Framework.Media.dll"};
            var s=new System.Collections.Generic.HashSet<string>();
            foreach(var dl in dlls){var p=Path.Combine(d,dl);if(!File.Exists(p))continue;var asm=AssemblyDefinition.ReadAssembly(p);
            foreach(var t in asm.MainModule.Types){if(!t.IsPublic||t.FullName.StartsWith("<")||t.FullName.StartsWith("_"))continue;
            if(string.IsNullOrEmpty(t.Namespace)||s.Contains(t.FullName))continue;s.Add(t.FullName);
            if(t.HasGenericParameters)continue;sb.AppendLine("[assembly: TypeForwardedTo(typeof("+t.FullName+"))]");}}
            File.WriteAllText(a[1],sb.ToString());Console.WriteLine("Generated "+s.Count+" forwarders");}}
          CSEOF
          cat > /tmp/extract-types/e.csproj << 'CSEOF'
          <Project Sdk="Microsoft.NET.Sdk"><PropertyGroup><OutputType>Exe</OutputType><TargetFramework>net8.0</TargetFramework></PropertyGroup><ItemGroup><PackageReference Include="Mono.Cecil" Version="0.11.5"/></ItemGroup></Project>
          CSEOF
          cd /tmp/extract-types && dotnet run -- "$KNI_DIR" /tmp/mg-facade/TypeForwarders.cs
          cd /tmp/mg-facade && rm -rf bin obj && dotnet build
          
          # Create KniCompatShim
          cat > /tmp/sdv-src/KniCompatShim.cs << 'CSHEOF'
          using System;using System.Collections.Generic;using System.IO;using System.Runtime.CompilerServices;
          namespace Microsoft.Xna.Framework.Audio{
          public class CueDefinition{public string name;public int[] category;public bool limitInstances;public int instanceLimit;public float[] limitBehaviors;public List<XactSound> sounds;public int[] weightedSounds;public int totalSoundWeights;public float dbVolume;public float? pitch;public float? volume;public CueDefinition(){sounds=new List<XactSound>();}public void SetSound(Array d,int s,int[] w,int t){}public void SetSound(Array d,int c,bool l,bool r){}public void SetSound(object d,int c,bool l,bool r){}public Action OnModified;}
          public class XactSound{public byte[] data;public bool looped;public float volume;}
          public class NoAudioHardwareException:Exception{public NoAudioHardwareException():base("No audio"){}public NoAudioHardwareException(string m):base(m){}}
          public static class CueExtensions{public static float get_Volume(this Cue c)=>0f;public static void set_Volume(this Cue c,float v){}public static float get_Pitch(this Cue c)=>0f;public static void set_Pitch(this Cue c,float v){}public static bool get_IsPitchBeingControlledByRPC(this Cue c)=>false;}
          public class OggStreamSoundEffect{public OggStreamSoundEffect(string f){}}
          public static class AudioEngineExtensions{public static int GetCategoryIndex(this AudioEngine e,string n)=>0;public static float[] GetReverbSettings(this AudioEngine e)=>new float[32];}
          public static class SoundBankExtensions{public static void AddCue(this SoundBank b,CueDefinition d){}public static bool Exists(this SoundBank b,string n)=>false;public static CueDefinition GetCueDefinition(this SoundBank b,string n)=>new CueDefinition();}}
          namespace Microsoft.Xna.Framework{
          public static class GameWindowExtensions{public static bool CenterOnDisplay(this GameWindow w,int i)=>true;public static Rectangle GetDisplayBounds(this GameWindow w,int i)=>new Rectangle(0,0,1280,720);public static int GetDisplayIndex(this GameWindow w)=>0;}}
          namespace Microsoft.Xna.Framework.Graphics{
          public static class Texture2DExtensions{public static int get_ActualWidth(this Texture2D t)=>t.Width;public static int get_ActualHeight(this Texture2D t)=>t.Height;public static void SetImageSize(this Texture2D t,int w,int h){}}}
          namespace xTile.ObjectModel{
          public static class PropertyValueExtensions{public static bool StartsWith(this PropertyValue v,string s)=>v.ToString().StartsWith(s);public static bool Contains(this PropertyValue v,string s)=>v.ToString().Contains(s);public static bool Contains(this PropertyValue v,string s,StringComparison sc)=>v.ToString().Contains(s,sc);public static int get_Length(this PropertyValue v)=>v.ToString().Length;}}
          CSHEOF
          cat > /tmp/sdv-src/DontLoadDefaultSetting.cs << 'EOF'
          using System;namespace StardewValley{[AttributeUsage(AttributeTargets.Field,AllowMultiple=false)]public class DontLoadDefaultSettingAttribute:Attribute{}}
          EOF

          # Create csproj
          cat > /tmp/sdv-src/StardewValley.csproj << CSPROJEOF
          <Project Sdk="Microsoft.NET.Sdk"><PropertyGroup><AssemblyName>Stardew Valley</AssemblyName><OutputType>Library</OutputType><TargetFramework>net8.0</TargetFramework><LangVersion>11.0</LangVersion><AllowUnsafeBlocks>true</AllowUnsafeBlocks><GenerateAssemblyInfo>false</GenerateAssemblyInfo><NoWarn>CS0168;CS0219;CS0414;CS0649;CS0169;CS8600;CS8601;CS8602;CS8603;CS8604;CS8610;CS8611;CS8625;CS8714;CS8765;CS8767;CS8769;CS1998;CS0108;CS0114;CS8019;CS0246;CS0234;CS0618;CS8321</NoWarn><RootNamespace /></PropertyGroup>
          <ItemGroup>
          <Reference Include="MonoGame.Framework"><HintPath>/tmp/mg-facade/bin/Debug/net8.0/MonoGame.Framework.dll</HintPath></Reference>
          <Reference Include="Xna.Framework"><HintPath>${KNI_DIR}/Xna.Framework.dll</HintPath></Reference>
          <Reference Include="Xna.Framework.Game"><HintPath>/tmp/kni-patched/Xna.Framework.Game.dll</HintPath></Reference>
          <Reference Include="Xna.Framework.Graphics"><HintPath>${KNI_DIR}/Xna.Framework.Graphics.dll</HintPath></Reference>
          <Reference Include="Xna.Framework.Content"><HintPath>${KNI_DIR}/Xna.Framework.Content.dll</HintPath></Reference>
          <Reference Include="Xna.Framework.Input"><HintPath>${KNI_DIR}/Xna.Framework.Input.dll</HintPath></Reference>
          <Reference Include="Xna.Framework.Audio"><HintPath>${KNI_DIR}/Xna.Framework.Audio.dll</HintPath></Reference>
          <Reference Include="Xna.Framework.Media"><HintPath>${KNI_DIR}/Xna.Framework.Media.dll</HintPath></Reference>
          <Reference Include="xTile"><HintPath>${SDV_DIR}/xTile.dll</HintPath></Reference>
          <Reference Include="StardewValley.GameData"><HintPath>${SDV_DIR}/StardewValley.GameData.dll</HintPath></Reference>
          <Reference Include="Lidgren.Network"><HintPath>${SDV_DIR}/Lidgren.Network.dll</HintPath></Reference>
          <Reference Include="BmFont"><HintPath>${SDV_DIR}/BmFont.dll</HintPath></Reference>
          <Reference Include="Steamworks.NET"><HintPath>${SDV_DIR}/Steamworks.NET.dll</HintPath></Reference>
          <Reference Include="GalaxyCSharp"><HintPath>${SDV_DIR}/GalaxyCSharp.dll</HintPath></Reference>
          <Reference Include="SkiaSharp"><HintPath>${SDV_DIR}/SkiaSharp.dll</HintPath></Reference>
          <Reference Include="TextCopy"><HintPath>${SDV_DIR}/TextCopy.dll</HintPath></Reference>
          <Reference Include="System.Data.HashFunction.Interfaces"><HintPath>${SDV_DIR}/System.Data.HashFunction.Interfaces.dll</HintPath></Reference>
          <Reference Include="System.Data.HashFunction.Core"><HintPath>${SDV_DIR}/System.Data.HashFunction.Core.dll</HintPath></Reference>
          <Reference Include="System.Data.HashFunction.xxHash"><HintPath>${SDV_DIR}/System.Data.HashFunction.xxHash.dll</HintPath></Reference>
          </ItemGroup></Project>
          CSPROJEOF

          # Apply source fixes
          cd /tmp/sdv-src
          sed -i 's/protected override void OnActivated(object sender, EventArgs args)/protected override void OnActivated(EventArgs args)/' StardewValley/GameRunner.cs
          sed -i 's/instance.Instance_OnActivated(sender, args)/instance.Instance_OnActivated(this, args)/' StardewValley/GameRunner.cs
          python3 -c "f=open('StardewValley.Internal/ForEachItemHelper.cs','r');c=f.read();f.close();c=c.replace('return CombinePath(((_003C_003Ec__DisplayClass4_0<TItem>)this).getParentPath, ((_003C_003Ec__DisplayClass4_0<TItem>)this).list);','return new System.Collections.Generic.List<object>();');f=open('StardewValley.Internal/ForEachItemHelper.cs','w');f.write(c);f.close()"
          sed -i '1i using StardewValley.Internal;' StardewValley.SaveMigrations/SaveMigrator_1_6.cs
          sed -i 's/Utility.ForEachItemContext(HandleItem)/Utility.ForEachItemContext((in ForEachItemContext context) => true)/' StardewValley.SaveMigrations/SaveMigrator_1_6.cs
          sed -i 's/cue\.Volume/cue.get_Volume()/g; s/cue\.Pitch/cue.get_Pitch()/g; s/cue\.IsPitchBeingControlledByRPC/cue.get_IsPitchBeingControlledByRPC()/g' StardewValley/CueWrapper.cs
          sed -i 's/cue.get_Volume() = value;/cue.set_Volume(value);/' StardewValley/CueWrapper.cs
          sed -i 's/cue.get_Pitch() = value;/cue.set_Pitch(value);/' StardewValley/CueWrapper.cs
          sed -i '/TextureTuckAmount/d' StardewValley/GameRunner.cs
          sed -i 's/SoundEffect\.FromStream(stream, flag2)/SoundEffect.FromStream(stream)/' StardewValley.Audio/AudioCueModificationManager.cs
          sed -i 's/soundEffect = new OggStreamSoundEffect(filePath)/soundEffect = null; \/\/ WASM stub/' StardewValley.Audio/AudioCueModificationManager.cs
          sed -i 's/, SurfaceFormat.Color)/)/g' StardewValley/Game1.cs StardewValley/DebugMetricsComponent.cs
          sed -i 's/\.ActualWidth/.Width/g; s/\.ActualHeight/.Height/g' StardewValley.Extensions/FrameworkExtensions.cs
          sed -i 's/!GameRunner.instance.Window.CenterOnDisplay(startupPreferences.displayIndex)/GameRunner.instance.Window.CenterOnDisplay(startupPreferences.displayIndex)/' StardewValley.Menus/TitleMenu.cs
          sed -i 's/reference = ref val;/\/\/reference = ref val;/' Netcode/NetDictionary.cs
          sed -i '1i using Microsoft.Xna.Framework;' StardewValley/Options.cs
          python3 -c "f=open('StardewValley/Program.cs','r');c=f.read();f.close();c=c.replace('_sdk = new SteamHelper ();\n\t\t\t\tif (_sdk == null) {\n\t\t\t\t\t_sdk = new NullSDKHelper ();\n\t\t\t\t}','_sdk = new NullSDKHelper ();');f=open('StardewValley/Program.cs','w');f.write(c);f.close()"
          sed -i 's/RequestLock(ContinueDemolish, BuildingLockFailed)/RequestLock(() => {}, BuildingLockFailed)/' StardewValley.Menus/CarpenterMenu.cs
          python3 -c "f=open('StardewValley.Menus/EmoteMenu.cs','r');c=f.read();f.close();c=c.replace('Vector2.Dot(value2: new Vector2((float)_emoteButtons[i].bounds.Center.X - ((float)xPositionOnScreen + (float)width / 2f), (float)_emoteButtons[i].bounds.Center.Y - ((float)yPositionOnScreen + (float)height / 2f)), value1: value)','Vector2.Dot(value, new Vector2((float)_emoteButtons[i].bounds.Center.X - ((float)xPositionOnScreen + (float)width / 2f), (float)_emoteButtons[i].bounds.Center.Y - ((float)yPositionOnScreen + (float)height / 2f)))');f=open('StardewValley.Menus/EmoteMenu.cs','w');f.write(c);f.close()"
          sed -i 's/, mipmap: false//g; s/, mipmap: true//g' StardewValley/Game1.cs StardewValley/DebugMetricsComponent.cs
          sed -i 's/value\.Length > 0/value.ToString().Length > 0/' StardewValley/GameLocation.cs
          sed -i '1i using xTile.ObjectModel;' StardewValley/GameLocation.cs StardewValley/InteriorDoor.cs StardewValley.Pathfinding/PathFindController.cs 2>/dev/null || true
          python3 -c "import re;f=open('StardewValley/ItemContextTagManager.cs','r');c=f.read();f.close();c=c.replace('goto IL_0207;','');c=c.replace('IL_0207:','if (true)');c=re.sub(r'(\t\t\t\})\n(\t\t\tcase .\(H\).:)',r'\1\n\t\t\t\tbreak;\n\2',c);c=c.replace('if (true)\n\t\t\t\tif (!objectData.CanBeGivenAsGift)\n\t\t\t\t{\n\t\t\t\t\tvalue.Add(\"not_giftable\");\n\t\t\t\t}\n\t\t\t\tbreak;','');f=open('StardewValley/ItemContextTagManager.cs','w');f.write(c);f.close()"
          sed -i 's/DontLoadDefaultSetting>/DontLoadDefaultSettingAttribute>/g' StardewValley/Options.cs
          
          # Build
          rm -rf bin obj
          dotnet build
          echo "SDV errors: $(dotnet build 2>&1 | grep 'error CS' | wc -l)"
          
          # Copy to wwwroot
          cp bin/Debug/net8.0/Stardew\ Valley.dll ../../${KNI_DIR}/../Stardew\ Valley.dll
          cp /tmp/mg-facade/bin/Debug/net8.0/MonoGame.Framework.dll ../../${KNI_DIR}/../MonoGame.Framework.dll
          mkdir -p ../../${KNI_DIR}/../content
          cp -r ${SDV_DIR}/Content/* ../../${KNI_DIR}/../content/
          echo "Source-compiled SDV copied to wwwroot"

      - name: Publish with AOT
        run: |
          export PATH="$PATH:$HOME/.dotnet"
          dotnet publish src/SdvWebPort.PoC.SdvBlazor/SdvWebPort.PoC.SdvBlazor.csproj -c Release -p:RunAOTCompilation=true
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: 1

      - name: Upload AOT artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdv-web-port-aot
          path: src/SdvWebPort.PoC.SdvBlazor/bin/Release/net8.0/publish/wwwroot/
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            src/SdvWebPort.PoC.SdvBlazor/obj/Release/net8.0/wasm/
          retention-days: 7
