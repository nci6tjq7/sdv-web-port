name: AOT Build (Source-Fixed KNI)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.412'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Clone and fix KNI source (Graphics only)
        run: |
          git clone --depth 1 https://github.com/kniEngine/kni.git /tmp/kni-src
          
          # Fix 1: GraphicsAdapter.IsProfileSupported → return true
          sed -i 's/return _strategy.Platform_IsProfileSupported(graphicsProfile);/return true; \/\/ Patched for WASM/' \
            /tmp/kni-src/src/Xna.Framework.Graphics/Graphics/GraphicsAdapter.cs
          
          # Fix 2: ConcreteGraphicsAdapter.Platform_IsProfileSupported → return true (bypass OffscreenCanvas)
          sed -i '/public override bool Platform_IsProfileSupported/,/^        }/c\        public override bool Platform_IsProfileSupported(GraphicsProfile graphicsProfile)\n        {\n            return true; \/\/ Patched for WASM\n        }' \
            /tmp/kni-src/Platforms/Graphics/.BlazorGL/ConcreteGraphicsAdapter.cs
          
          # Add missing packages
          dotnet add /tmp/kni-src/Platforms/Kni.Platform.Blazor.GL.csproj package StbImageWriteSharp 2>/dev/null || true
          dotnet add /tmp/kni-src/Platforms/Kni.Platform.Blazor.GL.csproj package StbImageSharp 2>/dev/null || true
          
          # Bump ALL versions to 4.2.9002
          # Bump ALL framework versions
          for f in $(find /tmp/kni-src/src /tmp/kni-src/Platforms -name '*.csproj'); do
                      sed -i 's/4.2.9001/4.2.9002/g' "$f"
                    done
          sed -i 's/4.2.9001/4.2.9002/g' /tmp/kni-src/Platforms/Kni.Platform.Blazor.GL.csproj
          
          echo "KNI source fixed (Graphics only)"

      - name: Build and pack KNI NuGet packages
        run: |
          dotnet build /tmp/kni-src/Kni.Platform.Blazor.GL.sln -c Release
          mkdir -p /tmp/kni-nuget
          
          # Pack all framework projects
          for proj in Xna.Framework Xna.Framework.Game Xna.Framework.Graphics Xna.Framework.Content Xna.Framework.Audio Xna.Framework.Input Xna.Framework.Media Xna.Framework.XR; do
            dotnet pack "/tmp/kni-src/src/$proj/$proj.csproj" -c Release -o /tmp/kni-nuget 2>/dev/null
          done
          # Pack Blazor platform
          dotnet pack /tmp/kni-src/Platforms/Kni.Platform.Blazor.GL.csproj -c Release -o /tmp/kni-nuget
          
          echo "KNI NuGet packages created:"
          ls /tmp/kni-nuget/*.nupkg

      - name: Clear NuGet cache and restore with fixed KNI
        run: |
          rm -rf ~/.nuget/packages/nkast.* 2>/dev/null
          dotnet restore src/SdvWebPort.PoC.SdvBlazor/SdvWebPort.PoC.SdvBlazor.csproj \
            --source /tmp/kni-nuget --source https://api.nuget.org/v3/index.json

      - name: Publish with AOT
        run: |
          dotnet publish src/SdvWebPort.PoC.SdvBlazor/SdvWebPort.PoC.SdvBlazor.csproj \
            -c Release -p:RunAOTCompilation=true --no-restore
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: 1

      - name: Upload AOT artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdv-web-port-aot-fixed-kni
          path: src/SdvWebPort.PoC.SdvBlazor/bin/Release/net8.0/publish/wwwroot/
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            src/SdvWebPort.PoC.SdvBlazor/obj/Release/net8.0/wasm/
          retention-days: 7
